# /etc/nginx/conf.d/default.conf

# /etc/nginx/conf.d/default.conf
server {
    listen 80;
    server_name _;

    # Avoid "413 Request Entity Too Large" when you add image upload later
    # Default is small (commonly 1M). :contentReference[oaicite:3]{index=3}
    client_max_body_size 10m;

    # Common reverse-proxy headers :contentReference[oaicite:4]{index=4}
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Optional: a quick Nginx-side health check
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # USERS
    location /api/users/ {
        proxy_pass http://users-service:8000/;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # PRODUCTS
    location /api/products/ {
        proxy_pass http://products-service:8080/;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ORDERS
    location /api/orders/ {
        proxy_pass http://orders-service:3000/;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # (Later) Frontend SPA:
    # location / {
    #     proxy_pass http://frontend:3000/;
    # }
}