openapi: 3.0.3
info:
  title: Products Service API
  version: 1.0.0
paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Products]
      summary: Create product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCreateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Products]
      summary: Get product details
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [Products]
      summary: Update product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Products]
      summary: Delete product
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Product deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{productId}/images/presign:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Product Images]
      summary: Generate image upload URL
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagePresignRequest'
      responses:
        '200':
          description: Pre-signed upload data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePresignResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{productId}/images/confirm:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Product Images]
      summary: Confirm uploaded image
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageConfirmRequest'
      responses:
        '200':
          description: Image confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{productId}/images:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Product Images]
      summary: List product images
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImagePage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{productId}/images/{imageId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/ImageId'
    delete:
      tags: [Product Images]
      summary: Delete product image
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Image deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/wishlists/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Wishlists]
      summary: List wishlist items for user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/wishlists/{userId}/{productId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Wishlists]
      summary: Add product to wishlist
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Wishlist item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Wishlists]
      summary: Remove product from wishlist
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Wishlist item deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      $ref: './common.yaml#/components/securitySchemes/BearerAuth'
  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ImageId:
      name: imageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: Sort expression, for example `price,asc`.
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
  schemas:
    ProductSummary:
      type: object
      required:
        - id
        - name
        - category
        - price
        - isOfficial
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        price:
          type: number
          format: double
        isOfficial:
          type: boolean
        thumbnailUrl:
          type: string
          format: uri
    TechnicalSpecs:
      type: object
      additionalProperties:
        type: string
    ProductImage:
      type: object
      required:
        - id
        - fileUrl
        - displayOrder
      properties:
        id:
          type: string
          format: uuid
        fileUrl:
          type: string
          format: uri
        displayOrder:
          type: integer
        uploadedAt:
          type: string
          format: date-time
    Product:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string
            stockQuantity:
              type: integer
            createdByUserId:
              type: string
              format: uuid
              nullable: true
            technicalSpecs:
              $ref: '#/components/schemas/TechnicalSpecs'
            images:
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    CreateProductRequest:
      type: object
      required:
        - name
        - category
        - price
        - stockQuantity
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
        technicalSpecs:
          $ref: '#/components/schemas/TechnicalSpecs'
    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
        technicalSpecs:
          $ref: '#/components/schemas/TechnicalSpecs'
    ProductCreateResponse:
      type: object
      required:
        - id
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    ImagePresignRequest:
      type: object
      required:
        - fileName
      properties:
        fileName:
          type: string
        contentType:
          type: string
    ImagePresignResponse:
      type: object
      required:
        - imageId
        - uploadUrl
      properties:
        imageId:
          type: string
          format: uuid
        uploadUrl:
          type: string
          format: uri
        expiresIn:
          type: integer
    ImageConfirmRequest:
      type: object
      required:
        - imageId
        - fileUrl
      properties:
        imageId:
          type: string
          format: uuid
        fileUrl:
          type: string
          format: uri
        displayOrder:
          type: integer
    WishlistItem:
      type: object
      required:
        - userId
        - productId
      properties:
        userId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time
    ProductPage:
      allOf:
        - $ref: './common.yaml#/components/schemas/PaginationResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/ProductSummary'
    ProductImagePage:
      allOf:
        - $ref: './common.yaml#/components/schemas/PaginationResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
    WishlistPage:
      allOf:
        - $ref: './common.yaml#/components/schemas/PaginationResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/WishlistItem'
