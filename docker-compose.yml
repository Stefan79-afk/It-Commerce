services:
  users-db:
    image: postgres:17
    container_name: users-db
    environment:
      POSTGRES_DB: ${USERS_POSTGRES_DB}
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_POSTGRES_USER} -d ${USERS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  users-service:
    build:
      context: ./users-service/
    container_name: users-service
    env_file:
      - .env
    depends_on:
      users-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./users-service/users_service:/app #bind mount: live code inside container
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  users_db_data:
