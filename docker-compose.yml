services:
# USERS SERVICE
  users-db:
    image: postgres:17
    container_name: users-db
    environment:
      POSTGRES_DB: ${USERS_POSTGRES_DB}
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_POSTGRES_USER} -d ${USERS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  users-service:
    build:
      context: ./users-service/
    container_name: users-service
    env_file:
      - .env
    depends_on:
      users-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./users-service/users_service:/app #bind mount: live code inside container
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

# PRODUCTS SERVICE
  products-db:
    image: postgres:17
    container_name: products-db
    environment:
      POSTGRES_DB: ${PRODUCTS_POSTGRES_DB}
      POSTGRES_USER: ${PRODUCTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PRODUCTS_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"   # avoid clashing with users-db published port
    volumes:
      - products_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCTS_POSTGRES_USER} -d ${PRODUCTS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  products-service:
    build:
      context: ./products-service/
    container_name: products-service
    env_file:
      - .env
    depends_on:
      products-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      # bind mount the project for fast iteration
      - ./products-service:/app
    command: >
      sh -c "./mvnw -q -DskipTests spring-boot:run"

# ---------- ORDERS ----------
  orders-db:
    image: mongo:7
    container_name: orders-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ORDERS_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${ORDERS_MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${ORDERS_MONGO_DB}
    ports:
      - "27017:27017"   # optional for host tooling
    volumes:
      - orders_db_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  orders-service:
    build:
      context: ./orders-service/
    container_name: orders-service
    env_file:
      - .env
    depends_on:
      orders-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - ./orders-service:/app
      - /app/node_modules   # keeps container node_modules from being overwritten by bind mount
    command: npm run dev

  nginx:
    image: nginx:1.27-alpine
    container_name: itcommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - users-service
      - products-service
      - orders-service


volumes:
  users_db_data:
  products_db_data:
  orders_db_data:
